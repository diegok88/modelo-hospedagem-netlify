[build]
  command = "ng build --configuration=production"
  publish = "dist/modelo-hospedagem-netlify/browser"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "11"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true

[functions]
  node_bundler = "esbuild"